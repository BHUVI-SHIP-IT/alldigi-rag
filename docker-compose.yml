networks:
  ragnet:
    driver: bridge
    internal: true

volumes:
  pg_data:
  qdrant_data:
  minio_data:
  model_cache:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ragnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  embedding:
    build:
      context: ./services/embedding
    restart: unless-stopped
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  llm:
    build:
      context: ./services/llm
    restart: unless-stopped
    environment:
      MODEL_URL: ${MODEL_URL}
      MODEL_FILE: ${MODEL_FILE}
      N_CTX: ${N_CTX:-4096}
      N_THREADS: ${N_THREADS:-4}
    volumes:
      - model_cache:/models
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 120s

  api:
    build:
      context: ./services/api
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__UseSSL: "false"
      Embedding__BaseUrl: "http://embedding:8000"
      Llm__BaseUrl: "http://llm:8081"
      Qdrant__Host: "qdrant"
      Qdrant__Port: "6333"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-480}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:-}
      Cache__TtlDays: ${CACHE_TTL_DAYS:-7}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
    networks:
      - ragnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      embedding:
        condition: service_healthy
      llm:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - ragnet
    depends_on:
      - api
